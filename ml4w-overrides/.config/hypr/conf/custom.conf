# Add your additional Hyprland configurations here

# -----------------------------------------------------
# Keyboard Layout
# overrides: ~/.config/hypr/conf/keyboard.conf
# -----------------------------------------------------
input {
    kb_layout = us,ru
    kb_options = caps:swapescape,grp:alt_shift_toggle
}

# -----------------------------------------------------
# Autostart (additions)
# see also: ~/.config/hypr/conf/autostart.conf
# -----------------------------------------------------
exec-once = hyprshade on blue-light-filter-soft
exec-once = [workspace 3 silent] slack
exec-once = [workspace 3 silent] flatpak run org.telegram.desktop
exec-once = flatpak run com.spotify.Client

# -----------------------------------------------------
# Window Rules
# -----------------------------------------------------
# Spotify do not want to open on 6 workspace on exec.
windowrule = match:class ^(spotify)$, workspace 6
