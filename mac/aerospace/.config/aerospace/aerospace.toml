after-login-command = []
after-startup-command = [
    'exec-and-forget /opt/homebrew/opt/sketchybar/bin/sketchybar',
    # JankyBorders frame around the focused window. Nord frost as active,
    # Afaneor's dim grey-purple for inactive (re-uses their alpha tuning).
    'exec-and-forget /opt/homebrew/opt/borders/bin/borders active_color=0xff88c0d0 inactive_color=0x20494d64 width=4.0',
    # App auto-launch. Slack before Telegram so it lands on the left in ws 3.
    'exec-and-forget open -a "Slack"',
    'exec-and-forget open -a "Telegram"',
    'exec-and-forget open -a "Spotify"',
    'exec-and-forget open -a "Google Chrome"',
]

# Notify sketchybar on every workspace change. plugins/space_windows.sh
# reads $AEROSPACE_FOCUSED_WORKSPACE and $AEROSPACE_PREV_WORKSPACE to
# repaint the highlight, so pass them through verbatim. Absolute path is
# required because aerospace's launchd PATH doesn't include /opt/homebrew/bin.
exec-on-workspace-change = [
    '/bin/bash',
    '-c',
    '/opt/homebrew/opt/sketchybar/bin/sketchybar --trigger aerospace_workspace_change AEROSPACE_FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE AEROSPACE_PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE',
]

start-at-login = true

# Keep the cursor on the active window/monitor so OS-level focus-follows-mouse
# checks (browser drag-and-drop targets, system shortcuts, etc.) line up with
# what aerospace considers focused.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

key-mapping.preset = 'qwerty'

[exec]
inherit-env-vars = true

[exec.env-vars]
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.bottom     = 8
outer.top        = 8
outer.right      = 8

[mode.main.binding]
# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-minus    = 'resize smart -50'
alt-equal    = 'resize smart +50'

# Layout
alt-slash    = 'layout tiles horizontal vertical'
alt-comma    = 'layout accordion horizontal vertical'

# Join — объединить с соседним окном в подконтейнер
alt-ctrl-h = 'join-with left'
alt-ctrl-j = 'join-with down'
alt-ctrl-k = 'join-with up'
alt-ctrl-l = 'join-with right'
alt-f        = 'fullscreen'
alt-t        = 'layout floating tiling'
alt-shift-f  = 'flatten-workspace-tree'

# Workspaces 1–9
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace and follow
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']

# Switch between last two workspaces
alt-tab = 'workspace-back-and-forth'

# Reload config
alt-shift-semicolon = 'reload-config'

# App shortcuts
alt-e = 'exec-and-forget open -a Finder'
alt-enter = 'exec-and-forget open -na Kitty'
alt-b = 'exec-and-forget open -a "Google Chrome"'

# Auto-assign apps to workspaces on launch.
# To trigger for already-running apps: quit & reopen, or `aerospace reload-config`.
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.jetbrains.PhpStorm'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 6'

# Markdown viewer — always floating
[[on-window-detected]]
if.app-id = 'com.uranusjr.macdown'
run = 'layout floating'

# System apps — always floating
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SystemPreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Archive-Utility'
run = 'layout floating'
