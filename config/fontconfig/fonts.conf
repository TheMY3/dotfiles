<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
  <alias>
    <family>serif</family>
    <prefer>
        <family>Font Awesome 6 Free</family>
        <family>FiraCode</family>
    </prefer>
  </alias>
  <alias>
    <family>font</family>
